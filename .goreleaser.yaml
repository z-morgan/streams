version: 2

builds:
  - main: ./cmd/streams
    binary: streams
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - formats:
      - tar.gz

checksum:
  name_template: checksums.txt

changelog:
  sort: asc

homebrew_casks:
  - name: streams
    binaries:
      - streams
    homepage: https://github.com/z-morgan/streams
    description: AI-powered software development pipeline orchestrator
    repository:
      owner: z-morgan
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
